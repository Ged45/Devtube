

services:

  postgres:
    image: postgres:17-alpine

    container_name: devtube-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-devtube}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    container_name: devtube-backend

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    environment:
      PORT: ${PORT:-5000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@postgres:5432/devtube?schema=public}

    depends_on:
      - postgres

  frontend:
    build: ./frontend

    container_name: devtube-frontend

    expose:
      - "5173":
      

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

volumes:
  postgres_data:

nginx:
  image: nginx:alpine

  container_name: devtube-nginx

  restart: unless-stopped

  ports:
    - "80:80"

  volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  depends_on:
    - frontend
    - backend

  networks:
    - devtube-network
